appId: com.browser-agent.app
productName: Browser Agent
electronVersion: "37.10.3"
directories:
  buildResources: build
files:
  - "out/**/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{tsconfig.json,tsconfig.node.json}"
extraResources:
  - from: ../../packages/server/overlay-init.js
    to: overlay-init.js
  - from: frontend-dist
    to: frontend-dist
    filter:
      - "**/*"
mac:
  target:
    - dmg
    - zip
  artifactName: "${name}-${version}-${arch}.${ext}"
win:
  target:
    - nsis
  artifactName: "${name}-${version}-${arch}.${ext}"
linux:
  target:
    - AppImage
  artifactName: "${name}-${version}-${arch}.${ext}"
