name: Release

on:
  push:
    tags:
      - "v*" # v* tag → 全量编译和发布（web + electron）
      - "w*" # w* tag → 仅编译和发布 web zip + version.json

  workflow_dispatch: # 手动触发 → 选择性发布
    inputs:
      tag:
        description: "上传到哪个 Release（如 v1.0.0，Release 需已存在）"
        required: true
        type: string
      build_web:
        description: "发布 web.zip + version.json"
        type: boolean
        default: false
      build_electron:
        description: "发布 macOS 应用"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      # ── 1. 计算本次实际需要构建的内容 ─────────────────────────
      # v* → 全量；w* → 仅 web；workflow_dispatch → 按输入
      - name: Compute build flags
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            REF="${{ github.ref_name }}"
            case "$REF" in
              v*)
                echo "web=true"      >> $GITHUB_OUTPUT
                echo "electron=true" >> $GITHUB_OUTPUT
                ;;
              w*)
                echo "web=true"      >> $GITHUB_OUTPUT
                echo "electron=false" >> $GITHUB_OUTPUT
                ;;
            esac
            echo "tag=$REF" >> $GITHUB_OUTPUT
          else
            echo "web=${{ inputs.build_web }}"           >> $GITHUB_OUTPUT
            echo "electron=${{ inputs.build_electron }}"  >> $GITHUB_OUTPUT
            echo "tag=${{ inputs.tag }}"                  >> $GITHUB_OUTPUT
          fi

      - name: Show build plan
        run: |
          echo "▶ trigger   : ${{ github.event_name }}"
          echo "▶ tag       : ${{ steps.flags.outputs.tag }}"
          echo "▶ build_web      : ${{ steps.flags.outputs.web }}"
          echo "▶ build_electron : ${{ steps.flags.outputs.electron }}"

      # ── 2. 公共步骤 ────────────────────────────────────────────
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build -w @browser-agent/shared

      # ── 3. Web 构建 ────────────────────────────────────────────
      # build_web=true  → 构建并发布 web.zip + version.json
      # build_electron=true (build_web=false) → 也需要构建 web dist 供 electron 使用，但不发布
      - name: Build web
        if: steps.flags.outputs.web == 'true' || steps.flags.outputs.electron == 'true'
        run: npm run build:zip -w @browser-agent/web

      # ── 4. Electron 构建 ───────────────────────────────────────
      - name: Sync version from tag to electron package.json
        if: steps.flags.outputs.electron == 'true'
        run: |
          TAG="${{ steps.flags.outputs.tag }}"
          VERSION="${TAG#v}"  # 去掉 v 前缀: v1.0.5 → 1.0.5
          echo "Setting electron package version to $VERSION"
          node -e "const f='packages/electron/package.json';const p=require('./'+f);p.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
          cat packages/electron/package.json | head -5

      - name: Build server (embed into electron)
        if: steps.flags.outputs.electron == 'true'
        run: npm run build:electron -w @browser-agent/server

      - name: Copy frontend dist into electron package
        if: steps.flags.outputs.electron == 'true'
        run: npm run fetch-frontend -w @browser-agent/electron -- --local ../web/dist --output frontend-dist

      - name: Build electron
        if: steps.flags.outputs.electron == 'true'
        run: npm run build -w @browser-agent/electron
        env:
          # Baked into the main-process bundle at build time via electron.vite.config.ts define().
          # Set FRONTEND_BUNDLE_URL in repo Settings → Secrets and variables → Actions.
          FRONTEND_BUNDLE_URL: ${{ secrets.FRONTEND_BUNDLE_URL }}

      # ── 5. 创建 Release 并上传产物 ──────────────────────────────
      - name: Ensure GitHub Release exists
        if: steps.flags.outputs.web == 'true' || steps.flags.outputs.electron == 'true'
        run: |
          TAG="${{ steps.flags.outputs.tag }}"
          if ! gh release view "$TAG" &>/dev/null; then
            echo "Creating release $TAG..."
            gh release create "$TAG" --title "$TAG" --generate-notes
          else
            echo "Release $TAG already exists."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Package & publish macOS app to GitHub Release
        if: steps.flags.outputs.electron == 'true'
        run: npm run package -w @browser-agent/electron -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uses ad-hoc signing (identity: "-" in electron-builder.yml).
          # This prevents macOS Sequoia from trashing unsigned apps.
          # Users will still need to right-click → Open on first launch.
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # disable real cert auto-discovery; ad-hoc is handled by electron-builder config
          # To enable proper Apple signing + notarization, uncomment and set these secrets:
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload web zip to GitHub Release
        if: steps.flags.outputs.web == 'true'
        run: |
          VERSION_JSON=packages/web/release/version.json
          # version.json 里的 zipFileName 字段就是本次构建对应的 zip 文件名
          ZIP_NAME=$(node -e "process.stdout.write(require('./$VERSION_JSON').zipFileName)")
          ZIP=packages/web/release/$ZIP_NAME
          # 校验：zip 文件必须存在，否则构建中途出错（version.json 已写但 zip 未完成）
          test -f "$ZIP" || { echo "❌ zip not found: $ZIP"; exit 1; }
          echo "Uploading $ZIP"
          gh release upload "${{ steps.flags.outputs.tag }}" "$ZIP" "$VERSION_JSON" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
