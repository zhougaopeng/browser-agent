name: Release

on:
  push:
    tags:
      - "v*" # Triggered by tags like v1.0.0, v0.2.1

permissions:
  contents: write # Required to create GitHub Releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build -w @browser-agent/server

      - name: Build web
        run: npm run build:zip -w @browser-agent/web

      - name: Copy frontend dist into electron package
        run: npm run fetch-frontend -w @browser-agent/electron -- --local ../web/dist --output frontend-dist

      - name: Build electron
        run: npm run build -w @browser-agent/electron

      - name: Package & publish to GitHub Release
        run: npm run package -w @browser-agent/electron -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (optional, set in repo secrets if you have a cert)
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Apple notarization (optional)
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # disable signing until certs are configured
