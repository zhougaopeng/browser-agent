<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep navy -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#050a1a"/>
    </radialGradient>

    <!-- Globe gradient: cyan to violet -->
    <radialGradient id="globeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner glow -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Circuit node glow -->
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for rounded corners -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedClip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle hex grid overlay -->
    <g opacity="0.06" stroke="#4f9de8" stroke-width="1" fill="none">
      <!-- Row 1 -->
      <polygon points="512,80 562,108 562,164 512,192 462,164 462,108"/>
      <polygon points="624,80 674,108 674,164 624,192 574,164 574,108"/>
      <polygon points="400,80 450,108 450,164 400,192 350,164 350,108"/>
      <polygon points="736,80 786,108 786,164 736,192 686,164 686,108"/>
      <polygon points="288,80 338,108 338,164 288,192 238,164 238,108"/>
      <!-- Row 2 -->
      <polygon points="568,192 618,220 618,276 568,304 518,276 518,220"/>
      <polygon points="456,192 506,220 506,276 456,304 406,276 406,220"/>
      <polygon points="680,192 730,220 730,276 680,304 630,276 630,220"/>
      <polygon points="344,192 394,220 394,276 344,304 294,276 294,220"/>
      <polygon points="792,192 842,220 842,276 792,304 742,276 742,220"/>
      <!-- Row 5 -->
      <polygon points="568,720 618,748 618,804 568,832 518,804 518,748"/>
      <polygon points="456,720 506,748 506,804 456,832 406,804 406,748"/>
      <polygon points="680,720 730,748 730,804 680,832 630,804 630,748"/>
      <polygon points="344,720 394,748 394,804 344,832 294,804 294,748"/>
      <polygon points="792,720 842,748 842,804 792,832 742,804 742,748"/>
      <!-- Row 6 -->
      <polygon points="512,832 562,860 562,916 512,944 462,916 462,860"/>
      <polygon points="624,832 674,860 674,916 624,944 574,916 574,860"/>
      <polygon points="400,832 450,860 450,916 400,944 350,916 350,860"/>
      <polygon points="736,832 786,860 786,916 736,944 686,916 686,860"/>
      <polygon points="288,832 338,860 338,916 288,944 238,916 238,860"/>
    </g>

    <!-- Outer ambient glow -->
    <circle cx="512" cy="512" r="340" fill="#3b82f6" opacity="0.07"/>
    <circle cx="512" cy="512" r="260" fill="#6366f1" opacity="0.09"/>

    <!-- Neural circuit lines radiating outward -->
    <g opacity="0.5" stroke="#00d4ff" stroke-width="2" fill="none" filter="url(#softGlow)">
      <!-- Top-left branch -->
      <line x1="512" y1="512" x2="340" y2="340"/>
      <line x1="340" y1="340" x2="280" y2="280"/>
      <line x1="340" y1="340" x2="300" y2="380"/>
      <!-- Top-right branch -->
      <line x1="512" y1="512" x2="684" y2="340"/>
      <line x1="684" y1="340" x2="744" y2="280"/>
      <line x1="684" y1="340" x2="724" y2="380"/>
      <!-- Bottom-left branch -->
      <line x1="512" y1="512" x2="340" y2="684"/>
      <line x1="340" y1="684" x2="280" y2="744"/>
      <line x1="340" y1="684" x2="300" y2="644"/>
      <!-- Bottom-right branch -->
      <line x1="512" y1="512" x2="684" y2="684"/>
      <line x1="684" y1="684" x2="744" y2="744"/>
      <line x1="684" y1="684" x2="724" y2="644"/>
      <!-- Left branch -->
      <line x1="512" y1="512" x2="280" y2="512"/>
      <line x1="280" y1="512" x2="200" y2="470"/>
      <line x1="280" y1="512" x2="200" y2="554"/>
      <!-- Right branch -->
      <line x1="512" y1="512" x2="744" y2="512"/>
      <line x1="744" y1="512" x2="824" y2="470"/>
      <line x1="744" y1="512" x2="824" y2="554"/>
      <!-- Top -->
      <line x1="512" y1="512" x2="512" y2="260"/>
      <line x1="512" y1="260" x2="470" y2="200"/>
      <line x1="512" y1="260" x2="554" y2="200"/>
      <!-- Bottom -->
      <line x1="512" y1="512" x2="512" y2="764"/>
      <line x1="512" y1="764" x2="470" y2="824"/>
      <line x1="512" y1="764" x2="554" y2="824"/>
    </g>

    <!-- Circuit nodes (outer) -->
    <g fill="#00d4ff" filter="url(#nodeGlow)" opacity="0.9">
      <circle cx="280" cy="280" r="8"/>
      <circle cx="744" cy="280" r="8"/>
      <circle cx="280" cy="744" r="8"/>
      <circle cx="744" cy="744" r="8"/>
      <circle cx="200" cy="470" r="6"/>
      <circle cx="200" cy="554" r="6"/>
      <circle cx="824" cy="470" r="6"/>
      <circle cx="824" cy="554" r="6"/>
      <circle cx="470" cy="200" r="6"/>
      <circle cx="554" cy="200" r="6"/>
      <circle cx="470" cy="824" r="6"/>
      <circle cx="554" cy="824" r="6"/>
      <!-- Mid nodes -->
      <circle cx="340" cy="340" r="7"/>
      <circle cx="684" cy="340" r="7"/>
      <circle cx="340" cy="684" r="7"/>
      <circle cx="684" cy="684" r="7"/>
      <circle cx="280" cy="512" r="7"/>
      <circle cx="744" cy="512" r="7"/>
      <circle cx="512" cy="260" r="7"/>
      <circle cx="512" cy="764" r="7"/>
    </g>

    <!-- Main globe / brain shape (layered circles) -->
    <!-- Outer ring glow -->
    <circle cx="512" cy="512" r="200" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.6" filter="url(#glow)"/>

    <!-- Globe body -->
    <circle cx="512" cy="512" r="190" fill="url(#globeGrad)" opacity="0.92"/>

    <!-- Latitude lines (browser-like horizontal arcs) -->
    <g fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.25">
      <ellipse cx="512" cy="512" rx="190" ry="60"/>
      <ellipse cx="512" cy="512" rx="190" ry="120"/>
      <!-- Vertical meridian lines -->
      <ellipse cx="512" cy="512" rx="60" ry="190"/>
      <ellipse cx="512" cy="512" rx="120" ry="190"/>
    </g>

    <!-- Browser cursor / agent symbol in center -->
    <!-- White arrow cursor -->
    <g filter="url(#softGlow)">
      <polygon
        points="480,466 480,566 508,542 524,578 542,570 526,534 558,534"
        fill="white"
        opacity="0.95"
      />
    </g>

    <!-- Outer ring shine -->
    <circle cx="512" cy="512" r="190" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>

    <!-- Top highlight -->
    <ellipse cx="470" cy="430" rx="70" ry="45" fill="white" opacity="0.08"/>
  </g>
</svg>
