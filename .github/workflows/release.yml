name: Release

on:
  push:
    tags:
      - "v*" # Triggered by tags like v1.0.0, v0.2.1

permissions:
  contents: write # Required to create GitHub Releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build:electron -w @browser-agent/server

      - name: Build web
        run: npm run build:zip -w @browser-agent/web

      - name: Copy frontend dist into electron package
        run: npm run fetch-frontend -w @browser-agent/electron -- --local ../web/dist --output frontend-dist

      - name: Build electron
        run: npm run build -w @browser-agent/electron
        env:
          # Baked into the main-process bundle at build time via electron.vite.config.ts define().
          # Set FRONTEND_BUNDLE_URL in repo Settings → Secrets and variables → Actions.
          FRONTEND_BUNDLE_URL: ${{ secrets.FRONTEND_BUNDLE_URL }}

      - name: Package & publish to GitHub Release
        run: npm run package -w @browser-agent/electron -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uses ad-hoc signing (identity: "-" in electron-builder.yml).
          # This prevents macOS Sequoia from trashing unsigned apps.
          # Users will still need to right-click → Open on first launch.
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # disable real cert auto-discovery; ad-hoc is handled by electron-builder config
          # To enable proper Apple signing + notarization, uncomment and set these secrets:
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Upload web zip to the same Release (only once, from the ubuntu runner)
      - name: Upload web zip to GitHub Release
        if: matrix.platform == 'linux'
        run: |
          ZIP=$(ls packages/web/release/web-*.zip | head -1)
          VERSION_JSON=packages/web/release/version.json
          gh release upload "${{ github.ref_name }}" "$ZIP" "$VERSION_JSON" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
