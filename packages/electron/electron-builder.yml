appId: com.browser-agent.app
productName: Browser Agent
electronVersion: "37.10.3"
directories:
  buildResources: build
files:
  - "out/**/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{tsconfig.json,tsconfig.node.json}"
extraResources:
  - from: ../../packages/server/overlay-init.js
    to: overlay-init.js
  - from: frontend-dist
    to: frontend-dist
    filter:
      - "**/*"
mac:
  identity: "-" # ad-hoc signing: no Apple cert needed, but prevents macOS Sequoia from trashing the app
  target:
    - dmg
    - zip # needed for electron-updater to publish latest-mac.yml for update detection
  artifactName: "browser-agent-${version}-${arch}.${ext}"

publish:
  provider: github
  owner: zhougaopeng
  repo: browser-agent
  releaseType: release
